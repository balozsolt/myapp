version: "3.8"

services:
  postgres:
    image: postgres:16
    container_name: myapp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: myapp
      POSTGRES_PASSWORD: myapp123
      POSTGRES_DB: myapp_vault
    ports:
      - "5432:5432"
    volumes:
      - myapp-postgres-data:/var/lib/postgresql/data

volumes:
  myapp-postgres-data: